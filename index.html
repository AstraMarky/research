<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherStudio | Portal</title>
    <link rel="icon" type="image/png" href="1.png">

    <meta property="og:title" content="ArcherStudio">
    <meta property="og:description" content="Built for those who value accuracy in their evidence and data.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSU65PFeWSzQdU_WVas1ygRbMl5PGIfH7cDTw&s">
    <meta property="og:url" content="https://astramarky.github.io/research/">
    <meta property="og:type" content="website">
    
    
    <style>
        :root {
            --primary-blue: #007aff;
            /* Apple/SaaS Blue */
            --bg-gray: #f8f9fa;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
        }

        /* SaaS Style Card */
        .loader-card {
            text-align: center;
            padding: 50px 70px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ArcherStudio Main Logo */
        #appLogo {
            width: 60px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
            /* Optional subtle filter to make it look sharp */
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        #studioTitle {
            color: var(--text-dark);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        #statusText {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Minimal Pulse Loader */
        .dot-pulse {
            display: flex;
            gap: 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-blue);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.3;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: white;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-card">
            <img id="appLogo" src="1.png" alt="ArcherStudio">
            <div id="studioTitle">ArcherStudio</div>
            
            <div class="dot-pulse">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <iframe id="appFrame" src=""></iframe>

<script>
    const baseUrl = "https://script.google.com/macros/s/AKfycbzRYZY9bJmWswC7dQS319qmorEztdFUUFl0elmdqKPigkmeSAFpB9aYCizuLMNGevBH/exec";
    const frame = document.getElementById('appFrame');

    function hideLoader() {
        const loader = document.getElementById('loader');
        setTimeout(() => {
            loader.style.opacity = "0";
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }, 1200);
    }
    frame.onload = hideLoader;

    // 1. Get current URL params
    const urlParams = new URLSearchParams(window.location.search);
    const currentAction = urlParams.get('action') || ''; // CATCH THE ACTION (approve/sendRequest)

    // 2. Storage Logic
    ['code', 'pin', 'group', 'user'].forEach(key => {
        if (urlParams.has(key)) {
            localStorage.setItem(`archer_${key}`, urlParams.get(key));
        }
    });

    // Only clear the URL if there isn't an important action happening
    if (window.location.search && !currentAction) {
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    // 3. GENERATE UNIQUE CANVAS SIGNAL
    function getCanvasFingerprint() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 200; canvas.height = 50;
        ctx.textBaseline = "top";
        ctx.font = "14px 'Arial'";
        ctx.fillStyle = "#f60"; ctx.fillRect(125,1,62,20);
        ctx.fillStyle = "#069"; ctx.fillText("ArcherStudio-Auth", 2, 15);
        return canvas.toDataURL();
    }

    const canvasSignal = getCanvasFingerprint();
    const rawSignal = [
        navigator.userAgent,
        screen.width + "x" + screen.height,
        canvasSignal,
        localStorage.getItem('archer_user') || 'guest'
    ].join('|');

    // 4. Create DFP
    const fullHash = btoa(rawSignal);
    const midPoint = Math.floor(fullHash.length / 2);
    const dfp = fullHash.substring(midPoint, midPoint + 16);

    // 5. Build final URL including the ACTION
    const finalParams = new URLSearchParams({
        code: localStorage.getItem('archer_code') || '',
        pin: localStorage.getItem('archer_pin') || '',
        group: localStorage.getItem('archer_group') || '',
        user: localStorage.getItem('archer_user') || '',
        dfp: dfp,
        action: currentAction // THIS WAS MISSING
    });

    frame.src = `${baseUrl}?${finalParams.toString()}`;
</script>
</body>
</html>
