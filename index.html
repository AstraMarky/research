<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherStudio | Portal</title>
    <link rel="icon" type="image/png" href="1.png">

    <meta property="og:title" content="ArcherStudio">
    <meta property="og:description" content="Built for those who value accuracy in their evidence and data.">
    <meta property="og:image" content="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSU65PFeWSzQdU_WVas1ygRbMl5PGIfH7cDTw&s">
    <meta property="og:url" content="https://astramarky.github.io/research/">
    <meta property="og:type" content="website">
    
    
    <style>
        :root {
            --primary-blue: #007aff;
            /* Apple/SaaS Blue */
            --bg-gray: #f8f9fa;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-in-out;
        }

        /* SaaS Style Card */
        .loader-card {
            text-align: center;
            padding: 50px 70px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ArcherStudio Main Logo */
        #appLogo {
            width: 60px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
            /* Optional subtle filter to make it look sharp */
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
        }

        #studioTitle {
            color: var(--text-dark);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        }

        #statusText {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 400;
        }

        /* Minimal Pulse Loader */
        .dot-pulse {
            display: flex;
            gap: 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-blue);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes pulse {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.3;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: white;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-card">
            <img id="appLogo" src="1.png" alt="ArcherStudio">
            <div id="studioTitle">ArcherStudio</div>
            
            <div class="dot-pulse">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <iframe id="appFrame" src="" onload="hideLoader()"></iframe>

    <script>
        const baseUrl = "https://script.google.com/macros/s/AKfycbzRYZY9bJmWswC7dQS319qmorEztdFUUFl0elmdqKPigkmeSAFpB9aYCizuLMNGevBH/exec";
        const frame = document.getElementById('appFrame');
        
        // 1. Grab URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Save params to localStorage if they exist in the link
        ['code', 'pin', 'group', 'user'].forEach(key => {
            if (urlParams.has(key)) {
                localStorage.setItem(`archer_${key}`, urlParams.get(key));
            }
        });
        
        // 3. Clean the visible URL (remove the parameters from the address bar)
        if (window.location.search) {
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }
        
        // 4. Generate or get 10-char Unique ID
        let uid = localStorage.getItem('archer_uid');
        if (!uid) {
            uid = Math.random().toString(36).substring(2, 12).toUpperCase();
            localStorage.setItem('archer_uid', uid);
        }
        
        // 5. Generate 16-char Device Fingerprint
        const signals = navigator.userAgent + navigator.language + screen.colorDepth + window.screen.width + "x" + window.screen.height;
        const dfp = btoa(signals).substring(0, 16);
        
        // 6. Build the iframe URL using the saved localStorage data + UID + DFP
        const queryArgs = new URLSearchParams({
            code: localStorage.getItem('archer_code') || '',
            pin: localStorage.getItem('archer_pin') || '',
            group: localStorage.getItem('archer_group') || '',
            user: localStorage.getItem('archer_user') || '',
            uid: uid,
            dfp: dfp
        }).toString();
        
        // Set the iframe source
        frame.src = `${baseUrl}?${queryArgs}`;
        
        // Hide loader when iframe finishes loading
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (frame.src !== "") {
                setTimeout(() => {
                    loader.style.opacity = "0";
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }, 1200);
            }
        }
    </script>
</body>
</html>
