<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Apps Script Loader</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: Arial, sans-serif; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Loading application...</p>
    </div>

    <iframe id="appFrame" src="" onload="hideLoader()"></iframe>

    <script>
        // 1. Get current URL parameters from the browser address bar
        const queryString = window.location.search;
        
        // 2. Define your base Apps Script URL
        const baseUrl = "https://script.google.com/macros/s/AKfycbzRYZY9bJmWswC7dQS319qmorEztdFUUFl0elmdqKPigkmeSAFpB9aYCizuLMNGevBH/exec";

        // 3. Combine them and set the iframe source
        const frame = document.getElementById('appFrame');
        if (queryString) {
            frame.src = baseUrl + queryString;
        } else {
            // Fallback if no variables are in the link
            frame.src = baseUrl; 
        }

        // 4. Hide loader once iframe finishes
        function hideLoader() {
            const loader = document.getElementById('loader');
            if(frame.src !== "") { // Ensure we don't hide it before the src is set
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }
        }
    </script>
</body>
</html>
