<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherStudio | Portal</title>
    <link rel="icon" type="image/png" href="1.png">
    <style>
        /* Dark Theme Reset */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #000000; /* Black background for the main page */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }

        /* Black Loading Screen */
        #loader { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #000000; /* ArcherStudio Black */
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            transition: opacity 0.6s ease-in-out;
        }

        /* Branding Styles */
        #studioTitle {
            color: #ffffff;
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }

        #groupLogo {
            width: 140px; 
            height: auto;
            margin-bottom: 25px;
            border: 2px solid #333; /* Subtle border for the logo */
            border-radius: 12px;
            padding: 5px;
            background: #0a0a0a;
        }

        /* Modern Spinner */
        .spinner { 
            border: 4px solid rgba(255, 255, 255, 0.1); 
            border-top: 4px solid #3498db; /* Archer Blue */
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; 
        }

        #loadingText {
            color: #888;
            font-size: 0.85rem;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div id="loader">
        <div id="studioTitle">ArcherStudio</div>
        <img id="groupLogo" src="1.png" alt="ArcherStudio Logo">
        
        <div class="spinner"></div>
        <p id="loadingText">INITIALIZING SYSTEM...</p>
    </div>

    <iframe id="appFrame" src="" onload="hideLoader()"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const group = urlParams.get('group');
        const queryString = window.location.search;
        
        const baseUrl = "https://script.google.com/macros/s/AKfycbzRYZY9bJmWswC7dQS319qmorEztdFUUFl0elmdqKPigkmeSAFpB9aYCizuLMNGevBH/exec";

        const logoImg = document.getElementById('groupLogo');
        const frame = document.getElementById('appFrame');
        const loadText = document.getElementById('loadingText');

        // Apply Group Customization
        if (group) {
            logoImg.src = group + ".png"; 
            loadText.innerText = "ACCESSING GROUP " + group + "...";
        }

        // Load Apps Script
        if (queryString) {
            frame.src = baseUrl + queryString;
        } else {
            frame.src = baseUrl;
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if(frame.src !== "") {
                setTimeout(() => {
                    loader.style.opacity = "0";
                    setTimeout(() => { loader.style.display = 'none'; }, 600);
                }, 1000); // 1s pause so they see the cool black logo screen
            }
        }
    </script>
</body>
</html>
