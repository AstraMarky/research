<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherStudio | Portal</title>
    <link rel="icon" type="image/png" href="1.png">
    
    <style>
        :root {
            --primary-blue: #007aff; /* Apple/SaaS Blue */
            --bg-gray: #f8f9fa;
            --text-dark: #1d1d1f;
            --text-muted: #86868b;
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #loader { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: var(--bg-gray); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            transition: opacity 0.5s ease-in-out;
        }

        /* SaaS Style Card */
        .loader-card {
            text-align: center;
            background: #ffffff;
            padding: 50px 70px;
            border-radius: 24px;
            /* Soft SaaS Shadow */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.02);
        }

        /* ArcherStudio Main Logo */
        #appLogo {
            width: 60px; 
            height: auto;
            border-radius: 10px;
            margin-bottom: 24px;
            /* Optional subtle filter to make it look sharp */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        #studioTitle {
            color: var(--text-dark);
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        #statusText {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-weight: 400;
        }

        /* Minimal Pulse Loader */
        .dot-pulse {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-blue);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
            background: white;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-card">
            <img id="appLogo" src="1.png" alt="ArcherStudio">
            <div id="studioTitle">ArcherStudio</div>
            
            <div class="dot-pulse">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
    </div>

    <iframe id="appFrame" src="" onload="hideLoader()"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const group = urlParams.get('group');
        const queryString = window.location.search;
        
        const baseUrl = "https://script.google.com/macros/s/AKfycbzRYZY9bJmWswC7dQS319qmorEztdFUUFl0elmdqKPigkmeSAFpB9aYCizuLMNGevBH/exec";
        const frame = document.getElementById('appFrame');
        const statusText = document.getElementById('statusText');

        // Set Frame Source
        if (queryString) {
            frame.src = baseUrl + queryString;
        } else {
            frame.src = baseUrl;
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if(frame.src !== "") {
                setTimeout(() => {
                    loader.style.opacity = "0";
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }, 1200);
            }
        }
    </script>
</body>
</html>
