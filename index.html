<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcherStudio | Portal</title>
    <link rel="icon" type="image/png" href="1.png">
    
    <style>
        /* Clean Modern Layout */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #f4f7f9; /* Light, soft background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #loader { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: #f4f7f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999; 
            transition: opacity 0.5s ease;
        }

        /* Loading Card */
        .loader-card {
            text-align: center;
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ArcherStudio Main Logo */
        #appLogo {
            width: 80px; 
            height: auto;
            margin-bottom: 20px;
        }

        #studioTitle {
            color: #2c3e50;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* Minimalist Line Spinner */
        .loading-bar-container {
            width: 150px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar-progress {
            width: 100%;
            height: 100%;
            background: #3498db;
            position: absolute;
            transform: translateX(-100%);
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }

        #statusText {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-card">
            <img id="appLogo" src="1.png" alt="ArcherStudio">
            <div id="studioTitle">ArcherStudio</div>
            
            <div class="loading-bar-container">
                <div class="loading-bar-progress"></div>
            </div>
            
            <p id="statusText">System Initializing</p>
        </div>
    </div>

    <iframe id="appFrame" src="" onload="hideLoader()"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const group = urlParams.get('group');
        const queryString = window.location.search;
        
        const baseUrl = "https://script.google.com/macros/s/AKfycbzRYZY9bJmWswC7dQS319qmorEztdFUUFl0elmdqKPigkmeSAFpB9aYCizuLMNGevBH/exec";
        const frame = document.getElementById('appFrame');
        const statusText = document.getElementById('statusText');

        // Logic to pass URL variables
        if (queryString) {
            frame.src = baseUrl + queryString;
            if (group) statusText.innerText = "Connecting Group " + group;
        } else {
            frame.src = baseUrl;
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if(frame.src !== "") {
                setTimeout(() => {
                    loader.style.opacity = "0";
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                }, 800); 
            }
        }
    </script>
</body>
</html>
